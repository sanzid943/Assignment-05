<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</head>
<body>
    <section class="flex justify-center items-center py-[60px]">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
        <div class="text-center mb-5">
            <img class="mx-auto" src="./assets/github-logo.png" alt="">
            <h2 class="text-[24px] font-bold">Github Issues Tracker</h2>
            <p>Sign in to manage your issues</p>
        </div>

        <label class="label">Username</label>
        <input id="username" type="text" class="input" placeholder="Enter Username" />

        <label class="label">Password</label>
        <input id="password" type="password" class="input" placeholder="Enter Password" />

        <button id="sign-in" class="btn btn-primary mt-4 mb-5">Sign In</button>

        <div>
            <h2 class="font-bold text-center text-[18px] mb-3">Demo Credentials</h2>
            <div class="text-center bg-white p-8 rounded-xl">
                <p><span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
            </div>
        </div>
        </fieldset>
    </section>

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <h3 class="text-lg font-bold">Login Failed!!</h3>
    <p class="py-4">Press ESC key or click the button below to close</p>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>

<script src="index.js"></script>
</body>
</html>
