<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Home</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
<header>
  <div class="navbar bg-base-100 shadow-sm flex flex-col md:flex-row md:justify-between md:items-center px-4 py-2 gap-3">
    <div class="flex-1 flex items-center justify-between md:justify-start mb-2 md:mb-0">
      <a class="btn btn-ghost flex items-center gap-2 text-[18px] sm:text-[20px] md:text-xl">
        <img src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="" class="w-6 h-6">
        Github Issues Tracker
      </a>
    </div>

    <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
      <input oninput="showSearch()" id="input-search" type="text" placeholder="Search issues..." class="input input-bordered w-full sm:flex-1 md:w-64" />
      <button class="btn btn-primary flex items-center gap-1">
        <i class="fa-solid fa-plus"></i> New issue</button>
    </div>
  </div>
</header>

    <section class="mt-[40px] w-full sm:w-11/12 md:w-4/5 mx-auto bg-gray-100 p-3 rounded-xl shadow-sm flex gap-3">
        <button id="all-btn" class="btn btn-primary">All</button>
         <button id="open-btn" class="btn">Open</button>
          <button id="closed-btn" class="btn">Closed</button>
    </section>

    <section id="spinner" class="mt-[40px] w-full sm:w-11/12 md:w-4/5 mx-auto justify-center items-center hidden">
        <span class="loading loading-spinner loading-xl"></span>
    </section>

    <section id="open-closed" class="mt-[20px] w-full sm:w-11/12 md:w-4/5 mx-auto bg-gray-100 shadow-sm rounded-xl p-3 flex justify-between items-center">
        <div class="left flex justify-center items-center gap-3">
            <div><img src="./assets/Aperture.png" alt=""></div>
            <div>
                <p class="text-[18px] font-bold"><span id="issue-count">0</span> Issues</p>
                <p class="text-[14px]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="right flex justify-center items-center gap-3">
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-green-500"></span>
                <span>Open</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-purple-500"></span>
                <span>Closed</span>
            </div>
        </div>
    </section>

        <section id="card-container" class="mt-5 w-full sm:w-11/12 md:w-4/5 mx-auto bg-gray-100 shadow-sm rounded-xl p-2 sm:p-3 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-3">
           
        </section>

    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
            <div id="modal-container" class="space-y-3">
                
            </div>
        <div class="modal-action">
            <form method="dialog">
                <button class="btn">Close</button>
            </form>
        </div>
    </div>
    </dialog>

    <script src="./login.js"></script>
</body>
</html>
